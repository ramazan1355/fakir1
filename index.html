<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Stream Short ID</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 120px; font-size: 1.2rem; text-align: center; margin: 10px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-start { background: #00c853; color: white; }
        .btn-connect { background: #2979ff; color: white; }
        .btn-start:hover, .btn-connect:hover { opacity: 0.8; }
        video { width: 100%; margin-top: 20px; border-radius: 10px; background: black; }
        #status { color: #aaa; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Трансляция на ТВ</h2>
    
    <div>
        <input type="text" id="peer-id" placeholder="ID (5 симв)" maxlength="5">
        <br>
        <button class="btn-start" id="start-btn">1. Запустить поток</button>
        <button class="btn-connect" id="connect-btn">2. Смотреть на ТВ</button>
    </div>

    <div id="status">Введите 5 символов и нажмите кнопку 1 на ПК или кнопку 2 на ТВ</div>
    <video id="remote-video" autoplay playsinline controls></video>
</div>

<script>
    let peer = null;
    let localStream = null;
    const status = document.getElementById('status');
    const videoEl = document.getElementById('remote-video');

    // Функция инициализации Peer с коротким ID
    function initPeer(id) {
        if (peer) peer.destroy();
        peer = new Peer(id);

        peer.on('open', (id) => {
            status.innerText = "Готов! Ваш ID: " + id;
            status.style.color = "#00c853";
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                alert("Этот ID уже занят! Придумайте другой.");
            } else {
                console.error(err);
            }
        });

        // Обработка входящего звонка (на ПК)
        peer.on('call', (call) => {
            if (localStream) {
                call.answer(localStream);
                status.innerText = "ТВ подключился!";
            }
        });
    }

    // Кнопка трансляции (для ПК)
    document.getElementById('start-btn').onclick = async () => {
        const id = document.getElementById('peer-id').value;
        if (id.length < 3) return alert("Введите хотя бы 3 символа");
        
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            initPeer(id);
        } catch (err) {
            alert("Ошибка доступа к экрану: " + err);
        }
    };

    // Кнопка просмотра (для ТВ)
    document.getElementById('connect-btn').onclick = () => {
        const id = document.getElementById('peer-id').value;
        const targetId = prompt("Введите ID транслятора (который ввели на ПК):", id);
        
        if (!peer) initPeer("tv-" + Math.floor(Math.random() * 100)); // Временный ID для ТВ

        setTimeout(() => {
            const call = peer.call(targetId, new MediaStream()); // Пустой стрим в ответ
            call.on('stream', (remoteStream) => {
                videoEl.srcObject = remoteStream;
                status.innerText = "Прием трансляции...";
            });
        }, 1000);
    };
</script>

</body>
</html>
